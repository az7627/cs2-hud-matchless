<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Match Results — CS2 HUD</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Rajdhani:wght@500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="css/Results.css">
</head>
<body>
    <div class="screen">
        <div class="content">

            <!-- Header -->
            <div class="header-title">═══ MATCH OVER ═══</div>

            <!-- Series -->
            <div class="series-badge">
                <input type="text" id="series-input" class="series-input" placeholder="Series" value="BEST OF 3" data-display="series-display" />
                <span id="series-display" class="series-display hidden"></span>
            </div>

            <!-- Winner -->
            <div class="winner-section">
                <div class="trophy"><i class="fa-solid fa-trophy"></i></div>
                <div class="winner-label">Champion</div>
                <input type="text" id="winner-input" class="winner-name-input" placeholder="Winner" value="Team Liquid" data-display="winner-display" />
                <span id="winner-display" class="winner-name winner-name-display hidden"></span>
                <div class="final-score">
                    <input type="number" id="final-ct-input" class="final-score-input" min="0" max="5" value="2" data-display="final-ct-display" style="color:var(--ct-blue);" />
                    <span id="final-ct-display" class="score-ct hidden" style="font-size:clamp(1.2rem,2vw,2.2rem);"></span>
                    <span class="dash">—</span>
                    <input type="number" id="final-t-input" class="final-score-input" min="0" max="5" value="1" data-display="final-t-display" style="color:var(--t-orange);" />
                    <span id="final-t-display" class="score-t hidden" style="font-size:clamp(1.2rem,2vw,2.2rem);"></span>
                </div>
            </div>

            <!-- Team Badges -->
            <div class="teams-row">
                <div class="team-badge ct">
                    <span class="side" style="color:var(--ct-blue);">TEAM A</span>
                    <input type="text" id="ct-name-input" class="name-input" placeholder="Team A" value="Team Liquid" data-display="ct-name-display" />
                    <span id="ct-name-display" class="name name-display hidden"></span>
                </div>
                <div style="color:var(--text-muted); font-size:clamp(0.85rem,1vw,1.2rem);font-weight:600;">VS</div>
                <div class="team-badge t">
                    <span class="side" style="color:var(--t-orange);">TEAM B</span>
                    <input type="text" id="t-name-input" class="name-input" placeholder="Team B" value="NAVI" data-display="t-name-display" />
                    <span id="t-name-display" class="name name-display hidden"></span>
                </div>
            </div>

            <!-- Map Breakdown -->
            <div class="map-breakdown">
                <div class="breakdown-title">═══ Map Breakdown ═══</div>
                <table class="breakdown-table">
                    <thead>
                        <tr>
                            <th style="width:2.5em;">#</th>
                            <th>Map</th>
                            <th id="result-header-a" style="width:2.5em;color:var(--ct-blue);">Team A</th>
                            <th id="result-header-b" style="width:2.5em;color:var(--t-orange);">Team B</th>
                            <th style="width:2.5em;">Result</th>
                        </tr>
                    </thead>
                    <tbody id="bd-tbody">
                        <!-- generated by JS -->
                    </tbody>
                </table>
            </div>

            <!-- Confirm -->
            <button id="confirm-btn" class="confirm-btn"><i class="fa-solid fa-star"></i> CONFIRM</button>

        </div>
    </div>

    <script src="js/Results.js"></script>
</body>
</html>
