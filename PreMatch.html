<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Starting Soon — CS2 HUD</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Rajdhani:wght@500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root {
            --bg-primary: #070c1a;
            --bg-secondary: #0d1628;
            --bg-card: #111d35;
            --bg-card-alt: #152240;
            --ct-blue: #3b82f6;
            --ct-blue-dim: #1d4ed8;
            --ct-glow: rgba(59, 130, 246, 0.12);
            --t-orange: #f59e0b;
            --t-orange-dim: #d97706;
            --t-glow: rgba(245, 158, 11, 0.12);
            --accent-gold: #ffd700;
            --text-primary: #f0f4ff;
            --text-secondary: #8899c0;
            --text-muted: #5a6e96;
            --border-color: #1e3055;
            --border-light: #2a4078;
            --shadow-sm: 0 2px 8px rgba(0, 0, 0, 0.3);
            --shadow-md: 0 4px 24px rgba(0, 0, 0, 0.5);
            --shadow-lg: 0 8px 48px rgba(0, 0, 0, 0.6);
            --radius-sm: 6px;
            --radius: 12px;
            --radius-lg: 20px;
            --font-body: 'Inter', 'Segoe UI', system-ui, -apple-system, sans-serif;
            --font-display: 'Rajdhani', 'Inter', sans-serif;
            --transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
        html, body {
            width: 100%; height: 100%; overflow: hidden;
            font-family: var(--font-body);
            background: var(--bg-primary);
            color: var(--text-primary);
            -webkit-font-smoothing: antialiased;
        }
        .screen {
            position: relative;
            width: 100vw; height: 100vh;
            aspect-ratio: 16 / 9;
            max-width: 100%; max-height: 100%;
            margin: 0 auto;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            background:
                radial-gradient(ellipse 60% 50% at 50% 30%, rgba(11, 22, 56, 0.5) 0%, transparent 70%),
                radial-gradient(ellipse 40% 30% at 20% 80%, rgba(59, 130, 246, 0.05) 0%, transparent 70%),
                radial-gradient(ellipse 40% 30% at 80% 80%, rgba(245, 158, 11, 0.05) 0%, transparent 70%),
                linear-gradient(180deg, #070c1a 0%, #0b1428 50%, #070c1a 100%);
            padding: 3vh 4vw;
        }
        .screen::before {
            content: '';
            position: absolute; inset: 0;
            background-image:
                linear-gradient(rgba(30, 48, 85, 0.12) 1px, transparent 1px),
                linear-gradient(90deg, rgba(30, 48, 85, 0.12) 1px, transparent 1px);
            background-size: 60px 60px;
            pointer-events: none; z-index: 0;
        }
        .screen > * { position: relative; z-index: 1; }

        .content {
            width: 100%; max-width: 1400px; max-height: 100%;
            display: flex; flex-direction: column;
            align-items: center; gap: 2.5vh;
        }

        /* ===== Title ===== */
        .prematch-title {
            font-family: var(--font-display);
            font-weight: 700;
            font-size: clamp(1rem, 1.6vw, 1.8rem);
            letter-spacing: 0.5em;
            text-transform: uppercase;
            color: var(--text-muted);
            margin-bottom: 0.5rem;
        }
        .prematch-title .highlight {
            color: var(--accent-gold);
            letter-spacing: 0.15em;
        }

        /* ===== Series Format ===== */
        .series-format {
            font-family: var(--font-display);
            font-weight: 600;
            font-size: clamp(0.75rem, 0.9vw, 1rem);
            letter-spacing: 0.3em;
            text-transform: uppercase;
            color: var(--text-secondary);
            background: rgba(255,255,255,0.04);
            border: 1px solid var(--border-color);
            border-radius: 999px;
            padding: 0.3em 1.5em;
        }
        .series-input {
            font-family: var(--font-display);
            font-weight: 600;
            font-size: clamp(0.75rem, 0.9vw, 1rem);
            letter-spacing: 0.3em;
            text-transform: uppercase;
            text-align: center;
            background: transparent;
            border: none;
            border-bottom: 1.5px solid var(--border-color);
            color: var(--text-primary);
            padding: 0.2em 0.5em;
            min-width: 100px;
            outline: none;
        }
        .series-input:focus { border-bottom-color: var(--text-secondary); }
        .series-input::placeholder { color: var(--text-muted); }
        .series-display { color: var(--text-secondary); }

        /* ===== Teams Row ===== */
        .teams-row {
            display: flex;
            align-items: center;
            gap: 2vw;
            width: 100%;
            justify-content: center;
            flex-shrink: 0;
        }

        .team-card {
            flex: 1;
            max-width: 460px;
            min-width: 0;
            background: var(--bg-card);
            border-radius: var(--radius);
            padding: 3vh 2.5vw;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.6em;
            box-shadow: var(--shadow-md);
            position: relative;
            overflow: hidden;
            transition: transform var(--transition);
        }
        .team-card:hover { transform: translateY(-2px); }
        .team-card::before {
            content: '';
            position: absolute; top: 0; left: 0; right: 0;
            height: 4px;
            border-radius: var(--radius) var(--radius) 0 0;
        }
        .team-card.ct::before { background: var(--ct-blue); }
        .team-card.t::before  { background: var(--t-orange); }
        .team-card.ct { box-shadow: var(--shadow-md), inset 0 0 60px var(--ct-glow); }
        .team-card.t  { box-shadow: var(--shadow-md), inset 0 0 60px var(--t-glow); }

        .side-badge {
            display: inline-flex;
            align-items: center;
            gap: 0.4em;
            font-family: var(--font-display);
            font-weight: 700;
            font-size: clamp(0.55rem, 0.75vw, 0.85rem);
            letter-spacing: 0.15em;
            text-transform: uppercase;
            padding: 0.2em 0.8em;
            border-radius: 999px;
            line-height: 1.6;
        }
        .team-card.ct .side-badge { color: var(--ct-blue); background: rgba(59, 130, 246, 0.12); }
        .team-card.t .side-badge  { color: var(--t-orange); background: rgba(245, 158, 11, 0.12); }

        .team-name-input {
            font-family: var(--font-display);
            font-weight: 700;
            font-size: clamp(1.5rem, 2.8vw, 3.2rem);
            text-align: center;
            background: transparent;
            border: none;
            border-bottom: 2px solid var(--border-color);
            color: var(--text-primary);
            width: 100%;
            padding: 0.1em 0.2em;
            outline: none;
        }
        .team-name-input:focus { border-bottom-color: var(--text-secondary); }
        .team-card.ct .team-name-input:focus { border-bottom-color: var(--ct-blue); }
        .team-card.t .team-name-input:focus  { border-bottom-color: var(--t-orange); }
        .team-name-input::placeholder { color: var(--text-muted); }

        .team-name-display {
            font-family: var(--font-display);
            font-weight: 700;
            font-size: clamp(1.5rem, 2.8vw, 3.2rem);
            text-align: center;
        }

        /* team logos — large vs emblem */
        .team-emblem {
            width: clamp(4rem, 8vw, 8rem);
            height: clamp(4rem, 8vw, 8rem);
            border-radius: 50%;
            background: rgba(255,255,255,0.03);
            border: 2px solid var(--border-color);
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: var(--font-display);
            font-weight: 700;
            font-size: clamp(1.5rem, 2.5vw, 2.8rem);
            color: var(--text-muted);
            margin-bottom: 0.3em;
        }
        .team-card.ct .team-emblem { border-color: rgba(59, 130, 246, 0.2); }
        .team-card.t .team-emblem  { border-color: rgba(245, 158, 11, 0.2); }

        .vs-center {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.3em;
            flex-shrink: 0;
        }
        .vs-text {
            font-family: var(--font-display);
            font-weight: 700;
            font-size: clamp(1.5rem, 2.5vw, 3rem);
            color: var(--text-secondary);
        }
        .live-dot {
            display: inline-flex;
            align-items: center;
            gap: 0.4em;
            font-family: var(--font-display);
            font-weight: 600;
            font-size: clamp(0.6rem, 0.75vw, 0.85rem);
            letter-spacing: 0.2em;
            text-transform: uppercase;
            color: #ef4444;
            opacity: 0;
            transition: opacity 0.5s;
        }
        .live-dot.visible { opacity: 1; }
        .live-dot .dot {
            width: 8px; height: 8px;
            border-radius: 50%;
            background: #ef4444;
            animation: blink 1.2s ease-in-out infinite;
        }
        @keyframes blink {
            0%, 100% { opacity: 1; }
            50%      { opacity: 0.2; }
        }

        /* ===== Map Info ===== */
        .map-info {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.6em 1.5em;
            flex-wrap: wrap;
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-sm);
            padding: 0.6vh 1.5vw;
            box-shadow: var(--shadow-sm);
        }
        .map-info-item {
            display: flex;
            align-items: center;
            gap: 0.5em;
            font-size: clamp(0.8rem, 1.05vw, 1.2rem);
            color: var(--text-secondary);
        }
        .map-info-item .label {
            color: var(--text-muted);
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            font-size: 0.8em;
        }
        .map-info-input {
            background: transparent;
            border: none;
            border-bottom: 1.5px solid var(--border-color);
            color: var(--text-primary);
            font-size: inherit;
            font-family: inherit;
            padding: 0.1em 0.3em;
            min-width: 60px;
            outline: none;
        }
        .map-info-input:focus { border-bottom-color: var(--text-secondary); }
        .map-info-input::placeholder { color: var(--text-muted); }
        .map-info-display {
            color: var(--text-primary);
            font-weight: 500;
        }

        /* ===== Start Time / Auto Countdown ===== */
        .timer-section {
            display: flex;
            align-items: center;
            gap: 0.8em;
            margin-top: 0.5vh;
        }
        .timer-label {
            font-family: var(--font-display);
            font-size: clamp(0.6rem, 0.75vw, 0.85rem);
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: var(--text-muted);
        }
        .time-input {
            font-family: 'Rajdhani', 'Inter', monospace;
            font-weight: 700;
            font-size: clamp(1.8rem, 3vw, 3.5rem);
            letter-spacing: 0.05em;
            color: var(--text-primary);
            background: rgba(0, 0, 0, 0.35);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-sm);
            padding: 0.1em 0.3em;
            width: 5em;
            text-align: center;
            line-height: 1.3;
            outline: none;
            color-scheme: dark;
            cursor: pointer;
        }
        .time-input:focus { border-color: var(--text-secondary); }
        .time-input::-webkit-calendar-picker-indicator {
            filter: invert(0.7);
            cursor: pointer;
        }

        .countdown-display {
            font-family: 'Rajdhani', 'Inter', monospace;
            font-weight: 700;
            font-size: clamp(3rem, 5vw, 5.5rem);
            letter-spacing: 0.08em;
            color: var(--accent-gold);
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid var(--accent-gold);
            border-radius: var(--radius-sm);
            padding: 0.1em 0.4em;
            min-width: 3em;
            text-align: center;
            line-height: 1.3;
            transition: color 0.3s, border-color 0.3s;
        }
        .countdown-display.zero {
            color: #ef4444;
            border-color: #ef4444;
        }
        .countdown-display.next-day {
            color: var(--text-muted);
            border-color: var(--border-color);
            font-size: clamp(1rem, 1.8vw, 2rem);
            padding: 0.25em 0.8em;
        }

        /* ===== Confirm Button ===== */
        .confirm-btn {
            font-family: var(--font-display);
            font-weight: 600;
            font-size: clamp(0.65rem, 0.85vw, 0.95rem);
            letter-spacing: 0.15em;
            text-transform: uppercase;
            padding: 0.6em 2.5em;
            border: 2px solid var(--accent-gold);
            border-radius: var(--radius-sm);
            cursor: pointer;
            transition: background var(--transition), color var(--transition), box-shadow var(--transition);
            background: transparent;
            color: var(--accent-gold);
            margin-top: 0.5vh;
        }
        .confirm-btn:hover {
            background: var(--accent-gold);
            color: #000;
            box-shadow: 0 0 30px rgba(255, 215, 0, 0.15);
        }

        /* ===== Utilities ===== */
        .hidden  { display: none !important; }
        .fade-in { animation: fadeIn 0.4s ease forwards; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(6px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        @media (max-width: 768px) {
            .screen { padding: 1.5vh 3vw; }
            .content { gap: 1.5vh; }
            .teams-row { gap: 1.5vw; }
            .team-card { padding: 1.5vh 3vw; }
        }
        input[type="number"]::-webkit-outer-spin-button,
        input[type="number"]::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
        input[type="number"] { -moz-appearance: textfield; }
    </style>
</head>
<body>
    <div class="screen">
        <div class="content">

            <!-- Title -->
            <div class="prematch-title">
                STARTING <span class="highlight">SOON</span>
            </div>

            <!-- Series Format -->
            <div class="series-format">
                <input type="text" id="series-input" class="series-input" placeholder="e.g. Best of 3" value="BEST OF 3" data-display="series-display" />
                <span id="series-display" class="series-display hidden"></span>
            </div>

            <!-- Teams -->
            <div class="teams-row">

                <!-- CT Card -->
                <div class="team-card ct">
                    <div class="side-badge">
                        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
                        CT
                    </div>
                    <div class="team-emblem" aria-hidden="true">CT</div>
                    <input type="text" id="ct-name-input" class="team-name-input" placeholder="Team CT" value="Team Liquid" data-display="ct-name-display" />
                    <span id="ct-name-display" class="team-name-display hidden"></span>
                </div>

                <!-- VS -->
                <div class="vs-center">
                    <div class="vs-text">VS</div>
                    <div class="live-dot" id="live-dot"><span class="dot"></span> LIVE</div>
                </div>

                <!-- T Card -->
                <div class="team-card t">
                    <div class="side-badge">
                        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 2 L15 9 L22 9 L16 14 L18 21 L12 17 L6 21 L8 14 L2 9 L9 9 Z"/></svg>
                        T
                    </div>
                    <div class="team-emblem" aria-hidden="true">T</div>
                    <input type="text" id="t-name-input" class="team-name-input" placeholder="Team T" value="NAVI" data-display="t-name-display" />
                    <span id="t-name-display" class="team-name-display hidden"></span>
                </div>

            </div>

            <!-- Map Info -->
            <div class="map-info">
                <div class="map-info-item">
                    <span class="label">Map</span>
                    <input type="text" id="map-number-input" class="map-info-input" placeholder="e.g. 1 of 3" value="1 of 3" data-display="map-number-display" style="min-width:50px;" />
                    <span id="map-number-display" class="map-info-display hidden"></span>
                </div>
                <div class="map-info-item">
                    <span style="color:var(--text-muted)">·</span>
                    <input type="text" id="map-name-input" class="map-info-input" placeholder="Map name" value="Inferno" data-display="map-name-display" />
                    <span id="map-name-display" class="map-info-display hidden"></span>
                </div>
                <div class="map-info-item">
                    <span style="color:var(--text-muted)">·</span>
                    <span class="label">Picked by</span>
                    <input type="text" id="map-picker-input" class="map-info-input" placeholder="Team" value="Team Liquid" data-display="map-picker-display" />
                    <span id="map-picker-display" class="map-info-display hidden"></span>
                </div>
            </div>

            <!-- Start Time / Auto Countdown -->
            <div class="timer-section">
                <span class="timer-label">Starts at</span>
                <input type="time" id="start-time-input" class="time-input" value="21:00" />
                <div id="countdown-display" class="countdown-display">--:--</div>
            </div>

            <!-- Confirm -->
            <button id="confirm-btn" class="confirm-btn"><i class="fa-solid fa-star"></i> CONFIRM</button>

        </div>
    </div>

    <script>
        (function() {
            'use strict';

            const confirmBtn = document.getElementById('confirm-btn');

            /* ---- Auto Countdown (time difference) ---- */
            const startTimeInput = document.getElementById('start-time-input');
            const countdownDisp  = document.getElementById('countdown-display');
            let countdownInterval = null;

            function formatCountdown(ms) {
                const totalSec = Math.floor(ms / 1000);
                if (totalSec <= 0) return '00:00';
                const hrs = Math.floor(totalSec / 3600);
                const mins = Math.floor((totalSec % 3600) / 60);
                const secs = totalSec % 60;
                // Show HH:MM:SS if >=1h, else MM:SS
                if (hrs > 0) {
                    return String(hrs).padStart(2, '0') + ':' + String(mins).padStart(2, '0') + ':' + String(secs).padStart(2, '0');
                }
                return String(mins).padStart(2, '0') + ':' + String(secs).padStart(2, '0');
            }

            function updateCountdown() {
                const timeStr = startTimeInput.value;
                if (!timeStr) {
                    countdownDisp.textContent = '--:--';
                    countdownDisp.className = 'countdown-display';
                    return;
                }

                const now = new Date();
                const [h, m] = timeStr.split(':').map(Number);
                const target = new Date(now);
                target.setHours(h, m, 0, 0);

                let diffMs = target - now;

                if (diffMs <= 0) {
                    // Start time has passed
                    if (Math.abs(diffMs) <= 2 * 3600 * 1000) {
                        // Passed within 2h → just finished, show 00:00
                        countdownDisp.textContent = '00:00';
                        countdownDisp.className = 'countdown-display zero';
                        return;
                    }
                    // Passed more than 2h ago → go to next day
                    target.setDate(target.getDate() + 1);
                    diffMs = target - now;
                }

                // Show countdown to the next occurrence
                countdownDisp.textContent = formatCountdown(diffMs);
                countdownDisp.className = 'countdown-display';
            }

            // Update every second
            countdownInterval = setInterval(updateCountdown, 1000);
            updateCountdown();

            // Also update when the time input changes
            startTimeInput.addEventListener('change', updateCountdown);
            startTimeInput.addEventListener('input', updateCountdown);

            /* ---- Confirm Logic ---- */
            const confirmAll = function() {
                // Lock all standard data-display inputs
                const inputs = document.querySelectorAll('[data-display]');
                inputs.forEach(function(input) {
                    const displayId = input.getAttribute('data-display');
                    const display = document.getElementById(displayId);
                    if (!display) return;
                    display.textContent = input.value || input.placeholder || '—';
                    input.classList.add('hidden');
                    display.classList.remove('hidden');
                    display.classList.add('fade-in');
                });

                // Hide the start-time label and input; countdown stays visible
                document.querySelector('.timer-label')?.classList.add('hidden');
                startTimeInput.classList.add('hidden');

                confirmBtn.classList.add('hidden');
            };

            confirmBtn.addEventListener('click', confirmAll);

            document.addEventListener('keydown', function(e) {
                if (e.key === 'Enter' && e.target.tagName === 'INPUT') {
                    e.preventDefault();
                }
            });

        })();
    </script>
</body>
</html>
