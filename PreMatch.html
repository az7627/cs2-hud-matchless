<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Starting Soon — CS2 HUD</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Rajdhani:wght@500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="css/PreMatch.css">
</head>
<body>
    <div class="screen">
        <div class="content">

            <!-- Title -->
            <div class="prematch-title">
                STARTING <span class="highlight">SOON</span>
            </div>

            <!-- Series Format -->
            <div class="series-format">
                <input type="text" id="series-input" class="series-input" placeholder="e.g. Best of 3" value="BEST OF 3" data-display="series-display" />
                <span id="series-display" class="series-display hidden"></span>
            </div>

            <!-- Teams -->
            <div class="teams-row">

                <!-- CT Card -->
                <div class="team-card ct">
                    <div class="side-badge">
                        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
                        CT
                    </div>
                    <div class="team-emblem" aria-hidden="true">CT</div>
                    <input type="text" id="ct-name-input" class="team-name-input" placeholder="Team CT" value="Team Liquid" data-display="ct-name-display" />
                    <span id="ct-name-display" class="team-name-display hidden"></span>
                </div>

                <!-- VS -->
                <div class="vs-center">
                    <div class="vs-text">VS</div>
                    <div class="live-dot" id="live-dot"><span class="dot"></span> LIVE</div>
                </div>

                <!-- T Card -->
                <div class="team-card t">
                    <div class="side-badge">
                        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 2 L15 9 L22 9 L16 14 L18 21 L12 17 L6 21 L8 14 L2 9 L9 9 Z"/></svg>
                        T
                    </div>
                    <div class="team-emblem" aria-hidden="true">T</div>
                    <input type="text" id="t-name-input" class="team-name-input" placeholder="Team T" value="NAVI" data-display="t-name-display" />
                    <span id="t-name-display" class="team-name-display hidden"></span>
                </div>

            </div>

            <!-- Map Info -->
            <div class="map-info">
                <div class="map-info-item">
                    <span class="label">Map</span>
                    <input type="text" id="map-number-input" class="map-info-input" placeholder="e.g. 1 of 3" value="1 of 3" data-display="map-number-display" style="min-width:50px;" />
                    <span id="map-number-display" class="map-info-display hidden"></span>
                </div>
                <div class="map-info-item">
                    <span style="color:var(--text-muted)">·</span>
                    <input type="text" id="map-name-input" class="map-info-input" placeholder="Map name" value="Inferno" data-display="map-name-display" />
                    <span id="map-name-display" class="map-info-display hidden"></span>
                </div>
                <div class="map-info-item">
                    <span style="color:var(--text-muted)">·</span>
                    <span class="label">Picked by</span>
                    <input type="text" id="map-picker-input" class="map-info-input" placeholder="Team" value="Team Liquid" data-display="map-picker-display" />
                    <span id="map-picker-display" class="map-info-display hidden"></span>
                </div>
            </div>

            <!-- Start Time / Auto Countdown -->
            <div class="timer-section">
                <span class="timer-label">Starts at</span>
                <input type="time" id="start-time-input" class="time-input" value="21:00" />
                <div id="countdown-display" class="countdown-display">--:--</div>
            </div>

            <!-- Confirm -->
            <button id="confirm-btn" class="confirm-btn"><i class="fa-solid fa-star"></i> CONFIRM</button>

        </div>
    </div>

    <script src="js/PreMatch.js"></script>
</body>
</html>
