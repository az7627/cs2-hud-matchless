<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Technical Break — CS2 HUD</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Rajdhani:wght@500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #070c1a;
            --bg-secondary: #0d1628;
            --bg-card: #111d35;
            --bg-card-alt: #152240;
            --ct-blue: #3b82f6;
            --ct-blue-dim: #1d4ed8;
            --ct-glow: rgba(59, 130, 246, 0.10);
            --t-orange: #f59e0b;
            --t-orange-dim: #d97706;
            --t-glow: rgba(245, 158, 11, 0.10);
            --accent-gold: #ffd700;
            --accent-green: #10b981;
            --text-primary: #f0f4ff;
            --text-secondary: #8899c0;
            --text-muted: #5a6e96;
            --border-color: #1e3055;
            --border-light: #2a4078;
            --shadow-sm: 0 2px 8px rgba(0, 0, 0, 0.4);
            --shadow-md: 0 4px 24px rgba(0, 0, 0, 0.6);
            --radius-sm: 8px;
            --radius: 14px;
            --font-body: 'Inter', 'Segoe UI', system-ui, -apple-system, sans-serif;
            --font-display: 'Rajdhani', 'Inter', sans-serif;
            --transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
        html, body {
            width: 100%; height: 100%; overflow: hidden;
            font-family: var(--font-body);
            background: var(--bg-primary);
            color: var(--text-primary);
            -webkit-font-smoothing: antialiased;
        }
        .screen {
            position: relative;
            width: 100vw; height: 100vh;
            aspect-ratio: 16 / 9;
            max-width: 100%; max-height: 100%;
            margin: 0 auto;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            background:
                radial-gradient(ellipse 60% 50% at 50% 40%, rgba(11, 22, 56, 0.5) 0%, transparent 70%),
                radial-gradient(ellipse 40% 30% at 50% 20%, rgba(239, 68, 68, 0.03) 0%, transparent 70%),
                radial-gradient(ellipse 40% 30% at 20% 80%, rgba(59, 130, 246, 0.03) 0%, transparent 70%),
                radial-gradient(ellipse 40% 30% at 80% 80%, rgba(245, 158, 11, 0.03) 0%, transparent 70%),
                linear-gradient(180deg, #070c1a 0%, #0b1428 50%, #070c1a 100%);
            padding: 4vh 4vw;
        }
        .screen::before {
            content: '';
            position: absolute; inset: 0;
            background-image:
                linear-gradient(rgba(30, 48, 85, 0.08) 1px, transparent 1px),
                linear-gradient(90deg, rgba(30, 48, 85, 0.08) 1px, transparent 1px);
            background-size: 60px 60px;
            pointer-events: none; z-index: 0;
        }
        .screen > * { position: relative; z-index: 1; }

        .content {
            width: 100%; max-width: 1100px; max-height: 100%;
            display: flex; flex-direction: column;
            align-items: center; gap: 2.5vh;
            text-align: center;
        }

        /* ===== Icon ===== */
        .pause-icon {
            font-size: clamp(3rem, 5vw, 5.5rem);
            line-height: 1;
            opacity: 0.6;
            color: var(--text-muted);
            margin-bottom: 0.5rem;
        }

        /* ===== Title ===== */
        .title {
            font-family: var(--font-display);
            font-weight: 700;
            font-size: clamp(1.8rem, 3.5vw, 3.8rem);
            letter-spacing: 0.35em;
            text-transform: uppercase;
            color: var(--text-primary);
        }
        .title .accent {
            color: var(--accent-gold);
        }

        /* ===== Subtitle / Reason ===== */
        .subtitle {
            font-family: var(--font-display);
            font-weight: 500;
            font-size: clamp(1rem, 1.3vw, 1.6rem);
            letter-spacing: 0.15em;
            color: var(--text-secondary);
            margin-top: -0.5vh;
        }

        .reason-input {
            font-family: var(--font-display);
            font-weight: 500;
            font-size: clamp(1rem, 1.3vw, 1.6rem);
            letter-spacing: 0.1em;
            text-align: center;
            background: transparent;
            border: none;
            border-bottom: 2px solid var(--border-color);
            color: var(--text-primary);
            padding: 0.2em 0.5em;
            min-width: 200px;
            max-width: 500px;
            outline: none;
        }
        .reason-input:focus { border-bottom-color: var(--text-secondary); }
        .reason-input::placeholder { color: var(--text-muted); }
        .reason-display {
            font-family: var(--font-display);
            font-weight: 500;
            font-size: clamp(0.85rem, 1.1vw, 1.3rem);
            letter-spacing: 0.1em;
            color: var(--text-secondary);
        }

        /* ===== Match Info ===== */
        .match-info {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1em 2.5em;
            flex-wrap: wrap;
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: var(--radius);
            padding: 1.2vh 2.5vw;
            box-shadow: var(--shadow-md);
            margin: 0.5vh 0;
        }
        .match-item {
            display: flex;
            align-items: center;
            gap: 0.5em;
            font-size: clamp(0.8rem, 1.05vw, 1.25rem);
            color: var(--text-secondary);
        }
        .match-item .label {
            color: var(--text-muted);
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            font-size: 0.8em;
        }
        .match-item .value {
            color: var(--text-primary);
            font-weight: 600;
        }
        .match-item .value.ct { color: var(--ct-blue); }
        .match-item .value.t  { color: var(--t-orange); }

        .match-input {
            background: transparent;
            border: none;
            border-bottom: 1.5px solid var(--border-color);
            color: var(--text-primary);
            font-size: inherit;
            font-family: inherit;
            padding: 0.1em 0.3em;
            min-width: 55px;
            outline: none;
        }
        .match-input:focus { border-bottom-color: var(--text-secondary); }
        .match-input::placeholder { color: var(--text-muted); }
        .match-display {
            color: var(--text-primary);
            font-weight: 600;
        }

        /* ===== Timer (elapsed count-up) ===== */
        .timer-section {
            display: flex;
            align-items: center;
            gap: 1em;
            flex-wrap: wrap;
            justify-content: center;
        }
        .timer-label {
            font-family: var(--font-display);
            font-weight: 600;
            font-size: clamp(0.65rem, 0.8vw, 0.9rem);
            letter-spacing: 0.15em;
            text-transform: uppercase;
            color: var(--text-muted);
        }
        .timer-display {
            font-family: 'Rajdhani', 'Inter', monospace;
            font-weight: 700;
            font-size: clamp(2.5rem, 4vw, 4.5rem);
            letter-spacing: 0.08em;
            color: var(--text-primary);
            background: rgba(0, 0, 0, 0.35);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-sm);
            padding: 0.1em 0.5em;
            min-width: 3em;
            text-align: center;
            line-height: 1.3;
            transition: color 0.3s, border-color 0.3s;
        }
        .timer-display.running {
            color: var(--accent-gold);
            border-color: var(--accent-gold);
        }
        .timer-display.paused {
            color: var(--text-secondary);
            border-color: var(--border-light);
        }

        .timer-btn {
            font-family: var(--font-display);
            font-weight: 600;
            font-size: clamp(0.65rem, 0.8vw, 0.9rem);
            letter-spacing: 0.1em;
            text-transform: uppercase;
            padding: 0.5em 1.5em;
            border: none;
            border-radius: var(--radius-sm);
            cursor: pointer;
            transition: background var(--transition), transform var(--transition), box-shadow var(--transition);
            border: 1px solid var(--border-color);
        }
        .timer-btn.play {
            background: linear-gradient(135deg, #059669, #10b981);
            color: #fff; border-color: #10b981;
            box-shadow: 0 0 20px rgba(16, 185, 129, 0.25);
        }
        .timer-btn.play:hover {
            background: linear-gradient(135deg, #047857, #059669);
            transform: translateY(-1px);
        }
        .timer-btn.pause-btn {
            background: var(--bg-card-alt);
            color: var(--text-secondary);
        }
        .timer-btn.pause-btn:hover { background: var(--border-color); color: var(--text-primary); }
        .timer-btn.reset-btn {
            background: var(--bg-card-alt);
            color: var(--text-secondary);
        }
        .timer-btn.reset-btn:hover { background: var(--border-color); color: var(--text-primary); }

        /* ===== Confirm ===== */
        .confirm-btn {
            font-family: var(--font-display);
            font-weight: 600;
            font-size: clamp(0.6rem, 0.75vw, 0.85rem);
            letter-spacing: 0.15em;
            text-transform: uppercase;
            padding: 0.5em 2.2em;
            border: 2px solid var(--accent-gold);
            border-radius: var(--radius-sm);
            cursor: pointer;
            transition: background var(--transition), color var(--transition), box-shadow var(--transition);
            background: transparent;
            color: var(--accent-gold);
            margin-top: 0.5vh;
        }
        .confirm-btn:hover {
            background: var(--accent-gold);
            color: #000;
            box-shadow: 0 0 30px rgba(255, 215, 0, 0.15);
        }

        .hidden  { display: none !important; }
        .fade-in { animation: fadeIn 0.4s ease forwards; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(6px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .deco-line {
            width: 120px; height: 1px;
            background: linear-gradient(90deg, transparent, var(--border-color), transparent);
        }

        @media (max-width: 768px) {
            .screen { padding: 2vh 3vw; }
            .match-info { padding: 1vh 3vw; gap: 0.5em 1em; }
        }
    </style>
</head>
<body>
    <div class="screen">
        <div class="content">

            <!-- Pause Icon -->
            <div class="pause-icon">⏸</div>

            <!-- Title -->
            <div class="title">TECHNICAL <span class="accent">BREAK</span></div>

            <!-- Reason -->
            <input type="text" id="reason-input" class="reason-input" placeholder="Reason for pause (optional)" value="Technical issue — please stand by" data-display="reason-display" maxlength="80" />
            <span id="reason-display" class="reason-display hidden"></span>

            <div class="deco-line"></div>

            <!-- Match Info -->
            <div class="match-info">
                <div class="match-item">
                    <span class="label">CT</span>
                    <input type="text" id="ct-name-input" class="match-input" placeholder="Team CT" value="Team Liquid" data-display="ct-name-display" style="color:var(--ct-blue);font-weight:600;" />
                    <span id="ct-name-display" class="match-display ct hidden"></span>
                </div>
                <div class="match-item" style="color:var(--text-muted);">VS</div>
                <div class="match-item">
                    <span class="label">T</span>
                    <input type="text" id="t-name-input" class="match-input" placeholder="Team T" value="NAVI" data-display="t-name-display" style="color:var(--t-orange);font-weight:600;" />
                    <span id="t-name-display" class="match-display t hidden"></span>
                </div>
                <div class="match-item">
                    <span style="color:var(--text-muted);">·</span>
                </div>
                <div class="match-item">
                    <span class="label">Map</span>
                    <input type="text" id="map-name-input" class="match-input" placeholder="Map" value="Inferno" data-display="map-name-display" />
                    <span id="map-name-display" class="match-display hidden"></span>
                </div>
            </div>

            <!-- Timer (count-up / elapsed time) -->
            <div class="timer-section">
                <span class="timer-label">Pause Duration</span>
                <div id="timer-display" class="timer-display">00:00</div>
                <button id="timer-start-btn" class="timer-btn play">▶ Start</button>
                <button id="timer-pause-btn" class="timer-btn pause-btn hidden">⏸ Pause</button>
                <button id="timer-reset-btn" class="timer-btn reset-btn hidden">Reset</button>
            </div>

            <!-- Confirm -->
            <button id="confirm-btn" class="confirm-btn">✦ CONFIRM</button>

        </div>
    </div>

    <script>
        (function() {
            'use strict';

            const confirmBtn = document.getElementById('confirm-btn');

            /* ---- Timer (count-UP) ---- */
            const timerDisplay = document.getElementById('timer-display');
            const startBtn     = document.getElementById('timer-start-btn');
            const pauseBtn     = document.getElementById('timer-pause-btn');
            const resetBtn     = document.getElementById('timer-reset-btn');

            let interval   = null;
            let elapsedSec = 0;
            let isRunning  = false;

            function formatElapsed(sec) {
                const m = Math.floor(sec / 60);
                const s = sec % 60;
                return String(m).padStart(2, '0') + ':' + String(s).padStart(2, '0');
            }
            function updateDisplay() {
                timerDisplay.textContent = formatElapsed(elapsedSec);
            }
            function tick() {
                elapsedSec++;
                updateDisplay();
            }

            function startTimer() {
                if (isRunning) return;
                isRunning = true;
                timerDisplay.classList.remove('paused');
                timerDisplay.classList.add('running');
                startBtn.classList.add('hidden');
                pauseBtn.classList.remove('hidden');
                resetBtn.classList.remove('hidden');
                interval = setInterval(tick, 1000);
            }
            function pauseTimer() {
                if (!isRunning) return;
                isRunning = false;
                if (interval) { clearInterval(interval); interval = null; }
                timerDisplay.classList.remove('running');
                timerDisplay.classList.add('paused');
                startBtn.classList.remove('hidden');
                startBtn.textContent = '▶ Resume';
                pauseBtn.classList.add('hidden');
            }
            function resetTimerFn() {
                if (interval) { clearInterval(interval); interval = null; }
                isRunning = false;
                elapsedSec = 0;
                updateDisplay();
                timerDisplay.classList.remove('running', 'paused');
                startBtn.classList.remove('hidden');
                startBtn.textContent = '▶ Start';
                pauseBtn.classList.add('hidden');
                resetBtn.classList.add('hidden');
            }

            startBtn.addEventListener('click', startTimer);
            pauseBtn.addEventListener('click', pauseTimer);
            resetBtn.addEventListener('click', resetTimerFn);

            /* ---- Confirm ---- */
            const confirmAll = function() {
                const inputs = document.querySelectorAll('[data-display]');
                inputs.forEach(function(input) {
                    const displayId = input.getAttribute('data-display');
                    const display = document.getElementById(displayId);
                    if (!display) return;
                    display.textContent = input.value || input.placeholder || '—';
                    input.classList.add('hidden');
                    display.classList.remove('hidden');
                    display.classList.add('fade-in');
                });
                confirmBtn.classList.add('hidden');
            };
            confirmBtn.addEventListener('click', confirmAll);

            document.addEventListener('keydown', function(e) {
                if (e.key === 'Enter' && e.target.tagName === 'INPUT') {
                    e.preventDefault();
                }
            });

        })();
    </script>
</body>
</html>
