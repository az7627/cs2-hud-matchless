<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Technical Break — CS2 HUD</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Rajdhani:wght@500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="css/TechBreak.css">
</head>
<body>
    <div class="screen">
        <div class="content">

            <!-- Pause Icon -->
            <div class="pause-icon"><i class="fa-solid fa-pause"></i></div>

            <!-- Title -->
            <div class="title">TECHNICAL <span class="accent">BREAK</span></div>

            <!-- Reason -->
            <input type="text" id="reason-input" class="reason-input" placeholder="Reason for pause (optional)" value="Technical issue — please stand by" data-display="reason-display" maxlength="80" />
            <span id="reason-display" class="reason-display hidden"></span>

            <div class="deco-line"></div>

            <!-- Match Info -->
            <div class="match-info">
                <div class="match-item">
                    <span class="label">CT</span>
                    <input type="text" id="ct-name-input" class="match-input" placeholder="Team CT" value="Team Liquid" data-display="ct-name-display" style="color:var(--ct-blue);font-weight:600;" />
                    <span id="ct-name-display" class="match-display ct hidden"></span>
                </div>
                <div class="match-item" style="color:var(--text-muted);">VS</div>
                <div class="match-item">
                    <span class="label">T</span>
                    <input type="text" id="t-name-input" class="match-input" placeholder="Team T" value="NAVI" data-display="t-name-display" style="color:var(--t-orange);font-weight:600;" />
                    <span id="t-name-display" class="match-display t hidden"></span>
                </div>
                <div class="match-item">
                    <span style="color:var(--text-muted);">·</span>
                </div>
                <div class="match-item">
                    <span class="label">Map</span>
                    <input type="text" id="map-name-input" class="match-input" placeholder="Map" value="Inferno" data-display="map-name-display" />
                    <span id="map-name-display" class="match-display hidden"></span>
                </div>
            </div>

            <!-- Timer (count-up / elapsed time) -->
            <div class="timer-section">
                <span class="timer-label">Pause Duration</span>
                <div id="timer-display" class="timer-display">00:00</div>
                <button id="timer-start-btn" class="timer-btn play"><i class="fa-solid fa-play"></i> Start</button>
                <button id="timer-pause-btn" class="timer-btn pause-btn hidden"><i class="fa-solid fa-pause"></i> Pause</button>
                <button id="timer-reset-btn" class="timer-btn reset-btn hidden">Reset</button>
            </div>

            <!-- Confirm -->
            <button id="confirm-btn" class="confirm-btn"><i class="fa-solid fa-star"></i> CONFIRM</button>

        </div>
    </div>

    <script src="js/TechBreak.js"></script>
</body>
</html>
