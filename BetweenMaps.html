<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Between Maps — CS2 HUD</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Rajdhani:wght@500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #070c1a;
            --bg-secondary: #0d1628;
            --bg-card: #111d35;
            --bg-card-alt: #152240;
            --ct-blue: #3b82f6;
            --ct-blue-dim: #1d4ed8;
            --ct-glow: rgba(59, 130, 246, 0.12);
            --t-orange: #f59e0b;
            --t-orange-dim: #d97706;
            --t-glow: rgba(245, 158, 11, 0.12);
            --accent-gold: #ffd700;
            --accent-green: #10b981;
            --text-primary: #f0f4ff;
            --text-secondary: #8899c0;
            --text-muted: #5a6e96;
            --border-color: #1e3055;
            --border-light: #2a4078;
            --shadow-sm: 0 2px 8px rgba(0, 0, 0, 0.3);
            --shadow-md: 0 4px 24px rgba(0, 0, 0, 0.5);
            --shadow-lg: 0 8px 48px rgba(0, 0, 0, 0.6);
            --radius-sm: 6px;
            --radius: 12px;
            --radius-lg: 20px;
            --font-body: 'Inter', 'Segoe UI', system-ui, -apple-system, sans-serif;
            --font-display: 'Rajdhani', 'Inter', sans-serif;
            --transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
        html, body {
            width: 100%; height: 100%; overflow: hidden;
            font-family: var(--font-body);
            background: var(--bg-primary);
            color: var(--text-primary);
            -webkit-font-smoothing: antialiased;
        }
        .screen {
            position: relative;
            width: 100vw; height: 100vh;
            aspect-ratio: 16 / 9;
            max-width: 100%; max-height: 100%;
            margin: 0 auto;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            background:
                radial-gradient(ellipse 60% 50% at 50% 40%, rgba(11, 22, 56, 0.5) 0%, transparent 70%),
                radial-gradient(ellipse 40% 30% at 20% 80%, rgba(59, 130, 246, 0.04) 0%, transparent 70%),
                radial-gradient(ellipse 40% 30% at 80% 80%, rgba(245, 158, 11, 0.04) 0%, transparent 70%),
                linear-gradient(180deg, #070c1a 0%, #0b1428 50%, #070c1a 100%);
            padding: 3vh 3vw;
        }
        .screen::before {
            content: '';
            position: absolute; inset: 0;
            background-image:
                linear-gradient(rgba(30, 48, 85, 0.10) 1px, transparent 1px),
                linear-gradient(90deg, rgba(30, 48, 85, 0.10) 1px, transparent 1px);
            background-size: 60px 60px;
            pointer-events: none; z-index: 0;
        }
        .screen > * { position: relative; z-index: 1; }

        .content {
            width: 100%; max-width: 1400px; max-height: 100%;
            display: flex; flex-direction: column;
            align-items: center;
            gap: 1.8vh;
        }

        /* ===== Header ===== */
        .header-title {
            font-family: var(--font-display);
            font-weight: 700;
            font-size: clamp(1.5rem, 2.2vw, 2.8rem);
            letter-spacing: 0.15em;
            text-transform: uppercase;
        }
        .header-title .deco { color: var(--text-muted); font-weight: 500; }

        .series-badge {
            font-family: var(--font-display);
            font-weight: 600;
            font-size: clamp(0.75rem, 0.9vw, 1.1rem);
            letter-spacing: 0.3em;
            text-transform: uppercase;
            color: var(--text-secondary);
            background: rgba(255,255,255,0.04);
            border: 1px solid var(--border-color);
            border-radius: 999px;
            padding: 0.3em 1.5em;
            display: inline-block;
        }
        .series-input {
            font-family: var(--font-display);
            font-weight: 600;
            font-size: clamp(0.75rem, 0.9vw, 1.1rem);
            letter-spacing: 0.3em;
            text-transform: uppercase;
            text-align: center;
            background: transparent;
            border: none;
            border-bottom: 1.5px solid var(--border-color);
            color: var(--text-primary);
            padding: 0.15em 0.4em;
            min-width: 80px;
            outline: none;
        }
        .series-input:focus { border-bottom-color: var(--text-secondary); }
        .series-input::placeholder { color: var(--text-muted); }
        .series-display { color: var(--text-secondary); }

        /* ===== Top team cards (just-ended map) ===== */
        .top-result {
            display: flex;
            align-items: center;
            gap: 1.5vw;
            width: 100%;
            justify-content: center;
            flex-shrink: 0;
        }
        .top-team {
            flex: 1;
            max-width: 380px;
            min-width: 0;
            background: var(--bg-card);
            border-radius: var(--radius);
            padding: 2vh 2vw;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.4em;
            box-shadow: var(--shadow-md);
            position: relative;
            overflow: hidden;
        }
        .top-team::before {
            content: '';
            position: absolute; top: 0; left: 0; right: 0;
            height: 3px;
            border-radius: var(--radius) var(--radius) 0 0;
        }
        .top-team.ct::before { background: var(--ct-blue); }
        .top-team.t::before  { background: var(--t-orange); }
        .top-team.ct { box-shadow: var(--shadow-md), inset 0 0 50px var(--ct-glow); }
        .top-team.t  { box-shadow: var(--shadow-md), inset 0 0 50px var(--t-glow); }

        .top-team .side-label {
            font-family: var(--font-display);
            font-weight: 700;
            font-size: clamp(0.6rem, 0.75vw, 0.85rem);
            letter-spacing: 0.15em;
            text-transform: uppercase;
            padding: 0.2em 0.8em;
            border-radius: 999px;
            line-height: 1.5;
        }
        .top-team.ct .side-label { color: var(--ct-blue); background: rgba(59,130,246,0.12); }
        .top-team.t .side-label  { color: var(--t-orange); background: rgba(245,158,11,0.12); }

        .top-team .team-name-text {
            font-family: var(--font-display);
            font-weight: 700;
            font-size: clamp(1.1rem, 1.8vw, 2rem);
            text-align: center;
        }
        .top-team .team-score-big {
            font-family: var(--font-display);
            font-weight: 700;
            font-size: clamp(2.8rem, 5vw, 5.5rem);
            line-height: 1;
        }
        .top-team.ct .team-score-big { color: var(--ct-blue); }
        .top-team.t .team-score-big  { color: var(--t-orange); }

        .top-vs {
            font-family: var(--font-display);
            font-weight: 700;
            font-size: clamp(0.9rem, 1.2vw, 1.4rem);
            color: var(--text-muted);
            flex-shrink: 0;
        }
        .top-winner {
            font-family: var(--font-display);
            font-weight: 600;
            font-size: clamp(0.7rem, 0.9vw, 1rem);
            letter-spacing: 0.15em;
            text-transform: uppercase;
            color: var(--accent-green);
            margin-top: -0.2em;
        }

        /* ===== Series Score Bar ===== */
        .series-score {
            display: flex;
            align-items: center;
            gap: 1em;
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: var(--radius);
            padding: 0.8vh 2.5vw;
            box-shadow: var(--shadow-sm);
        }
        .series-score .team-label {
            font-family: var(--font-display);
            font-weight: 600;
            font-size: clamp(0.75rem, 0.9vw, 1.1rem);
            letter-spacing: 0.1em;
            text-transform: uppercase;
        }
        .series-score .score-num {
            font-family: var(--font-display);
            font-weight: 700;
            font-size: clamp(1.5rem, 2.2vw, 2.5rem);
            min-width: 1.5em;
            text-align: center;
        }
        .series-score .score-num.ct { color: var(--ct-blue); }
        .series-score .score-num.t  { color: var(--t-orange); }
        .series-score .score-dash {
            color: var(--text-muted);
            font-weight: 300;
            font-size: clamp(1.2rem, 1.8vw, 2.2rem);
        }
        .series-score .series-label {
            color: var(--text-muted);
            font-family: var(--font-display);
            font-weight: 500;
            font-size: clamp(0.65rem, 0.8vw, 0.95rem);
            letter-spacing: 0.1em;
            text-transform: uppercase;
        }

        /* ===== Match History Table ===== */
        .history-section {
            width: 100%;
            max-width: 900px;
        }
        .history-title {
            font-family: var(--font-display);
            font-weight: 600;
            font-size: clamp(0.8rem, 1vw, 1.2rem);
            letter-spacing: 0.25em;
            text-transform: uppercase;
            color: var(--text-muted);
            margin-bottom: 0.5em;
            text-align: center;
        }

        .map-table {
            width: 100%;
            border-collapse: collapse;
        }
        .map-table th {
            font-family: var(--font-display);
            font-weight: 600;
            font-size: clamp(0.65rem, 0.8vw, 1rem);
            letter-spacing: 0.15em;
            text-transform: uppercase;
            color: var(--text-muted);
            padding: 0.4em 0.6em;
            text-align: left;
            border-bottom: 1px solid var(--border-color);
        }
        .map-table th:last-child { text-align: center; }
        .map-table th:nth-child(3),
        .map-table th:nth-child(4),
        .map-table th:nth-child(5) { text-align: center; }

        .map-row {
            transition: background var(--transition);
            border-bottom: 1px solid rgba(30, 48, 85, 0.4);
        }
        .map-row td {
            padding: 0.5em 0.6em;
            font-size: clamp(0.75rem, 0.9vw, 1.05rem);
            vertical-align: middle;
        }
        .map-row td:nth-child(3),
        .map-row td:nth-child(4),
        .map-row td:nth-child(5) { text-align: center; }
        .map-row td:last-child { text-align: center; }

        .map-row.finished {
            background: rgba(255, 215, 0, 0.06);
            border-left: 3px solid var(--accent-gold);
        }
        .map-row.finished td:first-child {
            padding-left: calc(0.5em - 3px);
        }

        .map-row .map-number {
            color: var(--text-muted);
            font-family: var(--font-display);
            font-weight: 600;
        }
        .map-row .map-name-text {
            font-weight: 600;
        }
        .map-row .score-text.ct { color: var(--ct-blue); font-weight: 700; }
        .map-row .score-text.t  { color: var(--t-orange); font-weight: 700; }
        .map-row .score-text.win { color: var(--accent-green); }
        .map-row .winner-badge {
            font-family: var(--font-display);
            font-weight: 600;
            font-size: 0.8em;
            padding: 0.15em 0.6em;
            border-radius: 999px;
        }
        .map-row .winner-badge.ct { color: var(--ct-blue); background: rgba(59,130,246,0.12); }
        .map-row .winner-badge.t  { color: var(--t-orange); background: rgba(245,158,11,0.12); }

        .map-row .status-badge {
            font-family: var(--font-display);
            font-weight: 600;
            font-size: 0.75em;
            letter-spacing: 0.05em;
            color: var(--accent-gold);
            white-space: nowrap;
        }
        .map-row .status-badge .arrow {
            display: inline-block;
            animation: pulse-arrow 1.5s ease-in-out infinite;
        }
        @keyframes pulse-arrow {
            0%, 100% { opacity: 1; }
            50%      { opacity: 0.3; }
        }

        /* Inputs inside table */
        .map-row .map-input {
            background: transparent;
            border: none;
            border-bottom: 1.5px solid var(--border-color);
            color: var(--text-primary);
            font-size: inherit;
            font-family: inherit;
            padding: 0.15em 0.3em;
            outline: none;
            width: 100%;
            min-width: 50px;
        }
        .map-row .map-input:focus { border-bottom-color: var(--text-secondary); }
        .map-row .map-input::placeholder { color: var(--text-muted); }
        .map-row .score-input {
            background: transparent;
            border: none;
            border-bottom: 1.5px solid var(--border-color);
            color: var(--text-primary);
            font-family: var(--font-display);
            font-weight: 700;
            font-size: inherit;
            text-align: center;
            padding: 0.15em 0.1em;
            width: 2.2em;
            outline: none;
        }
        .map-row .score-input:focus { border-bottom-color: var(--text-secondary); }
        .map-row .score-sep {
            color: var(--text-muted);
            padding: 0 0.1em;
        }
        .map-row .finished-radio {
            appearance: none;
            -webkit-appearance: none;
            width: 16px; height: 16px;
            border: 2px solid var(--border-color);
            border-radius: 50%;
            cursor: pointer;
            position: relative;
            transition: border-color var(--transition), background var(--transition);
            vertical-align: middle;
        }
        .map-row .finished-radio:checked {
            border-color: var(--accent-gold);
            background: var(--accent-gold);
        }
        .map-row .finished-radio:checked::after {
            content: '';
            position: absolute;
            top: 3px; left: 3px;
            width: 6px; height: 6px;
            border-radius: 50%;
            background: #000;
        }
        .map-row .finished-radio:hover { border-color: var(--text-secondary); }
        .map-row .radio-label {
            font-size: clamp(0.45rem, 0.55vw, 0.65rem);
            color: var(--text-muted);
            letter-spacing: 0.05em;
            cursor: pointer;
            vertical-align: middle;
        }
        .map-row .radio-label.checked-label {
            color: var(--accent-gold);
        }

        /* ===== Next Map ===== */
        .next-section {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1em 2.5em;
            flex-wrap: wrap;
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-sm);
            padding: 0.5vh 1.5vw;
            box-shadow: var(--shadow-sm);
            width: 100%;
            max-width: 800px;
        }
        .next-item {
            display: flex;
            align-items: center;
            gap: 0.5em;
            font-size: clamp(0.75rem, 0.9vw, 1.05rem);
            color: var(--text-secondary);
        }
        .next-item .label {
            color: var(--text-muted);
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            font-size: 0.8em;
        }
        .next-input {
            background: transparent;
            border: none;
            border-bottom: 1.5px solid var(--border-color);
            color: var(--text-primary);
            font-size: inherit;
            font-family: inherit;
            padding: 0.1em 0.3em;
            min-width: 60px;
            outline: none;
        }
        .next-input:focus { border-bottom-color: var(--text-secondary); }
        .next-input::placeholder { color: var(--text-muted); }
        .next-display { color: var(--text-primary); font-weight: 500; }

        /* ===== Start Time / Auto Countdown ===== */
        .timer-section {
            display: flex;
            align-items: center;
            gap: 0.6em;
        }
        .timer-label {
            font-family: var(--font-display);
            font-size: clamp(0.5rem, 0.6vw, 0.7rem);
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: var(--text-muted);
        }
        .time-input {
            font-family: 'Rajdhani', 'Inter', monospace;
            font-weight: 700;
            font-size: clamp(1rem, 1.3vw, 1.6rem);
            letter-spacing: 0.05em;
            color: var(--text-primary);
            background: rgba(0, 0, 0, 0.35);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-sm);
            padding: 0.15em 0.3em;
            width: 5em;
            text-align: center;
            line-height: 1.3;
            outline: none;
            color-scheme: dark;
            cursor: pointer;
        }
        .time-input:focus { border-color: var(--text-secondary); }
        .time-input::-webkit-calendar-picker-indicator {
            filter: invert(0.7);
            cursor: pointer;
        }

        .countdown-display {
            font-family: 'Rajdhani', 'Inter', monospace;
            font-weight: 700;
            font-size: clamp(1.8rem, 2.8vw, 3.2rem);
            letter-spacing: 0.08em;
            color: var(--accent-gold);
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid var(--accent-gold);
            border-radius: var(--radius-sm);
            padding: 0.1em 0.4em;
            min-width: 2.5em;
            text-align: center;
            line-height: 1.3;
            transition: color 0.3s, border-color 0.3s;
        }
        .countdown-display.zero {
            color: #ef4444;
            border-color: #ef4444;
        }
        .countdown-display.next-day {
            color: var(--text-muted);
            border-color: var(--border-color);
            font-size: clamp(0.9rem, 1.3vw, 1.5rem);
            padding: 0.2em 0.6em;
        }

        /* ===== Confirm ===== */
        .confirm-btn {
            font-family: var(--font-display);
            font-weight: 600;
            font-size: clamp(0.6rem, 0.75vw, 0.85rem);
            letter-spacing: 0.15em;
            text-transform: uppercase;
            padding: 0.5em 2.2em;
            border: 2px solid var(--accent-gold);
            border-radius: var(--radius-sm);
            cursor: pointer;
            transition: background var(--transition), color var(--transition), box-shadow var(--transition);
            background: transparent;
            color: var(--accent-gold);
            margin-top: 0.3vh;
        }
        .confirm-btn:hover {
            background: var(--accent-gold);
            color: #000;
            box-shadow: 0 0 30px rgba(255, 215, 0, 0.15);
        }

        .hidden  { display: none !important; }
        .fade-in { animation: fadeIn 0.4s ease forwards; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(6px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        @media (max-width: 768px) {
            .screen { padding: 1.5vh 3vw; }
            .top-result { gap: 1vw; }
            .top-team { padding: 1vh 2vw; }
            .next-section { gap: 0.5em 1em; }
        }
        input[type="number"]::-webkit-outer-spin-button,
        input[type="number"]::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
        input[type="number"] { -moz-appearance: textfield; }
    </style>
</head>
<body>
    <div class="screen">
        <div class="content">

            <!-- Header -->
            <div class="header-title">
                <span class="deco">—</span> MAP COMPLETE <span class="deco">—</span>
            </div>
            <div class="series-badge">
                <input type="text" id="series-input" class="series-input" placeholder="Best of" value="BEST OF 3" data-display="series-display" />
                <span id="series-display" class="series-display hidden"></span>
            </div>

            <!-- Top Result: just-finished map scores -->
            <div class="top-result" id="top-result">
                <div class="top-team ct">
                    <div class="side-label">COUNTER-TERRORIST</div>
                    <div class="team-name-text" id="top-ct-name">Team Liquid</div>
                    <div class="team-score-big" id="top-ct-score">13</div>
                </div>
                <div class="top-vs">FINAL</div>
                <div class="top-team t">
                    <div class="side-label">TERRORIST</div>
                    <div class="team-name-text" id="top-t-name">NAVI</div>
                    <div class="team-score-big" id="top-t-score">8</div>
                </div>
            </div>
            <div class="top-winner" id="top-winner">✓ WINNER: Team Liquid</div>

            <!-- Series Score -->
            <div class="series-score">
                <span class="team-label ct" id="series-ct-label" style="color:var(--ct-blue);">Team A</span>
                <span class="score-num ct" id="series-ct-score">1</span>
                <span class="score-dash">—</span>
                <span class="score-num t" id="series-t-score">0</span>
                <span class="team-label t" id="series-t-label" style="color:var(--t-orange);">Team B</span>
                <span class="series-label">Series</span>
            </div>

            <!-- Team Names Row (hidden inputs for top card) -->
            <div style="display:flex; gap:1.5em; flex-wrap:wrap; justify-content:center; align-items:center;">
                <div class="map-info-item" style="font-size:clamp(0.7rem,0.85vw,1rem);color:var(--text-muted);">
                    <span class="label" style="color:var(--ct-blue);font-weight:600;">Team A</span>
                    <input type="text" id="ct-team-name-input" class="next-input" placeholder="Team A" value="Team Liquid" data-display="ct-team-name-display" style="font-size:inherit;min-width:100px;" />
                    <span id="ct-team-name-display" class="next-display hidden" style="color:var(--ct-blue);"></span>
                </div>
                <span style="color:var(--text-muted);font-size:clamp(0.7rem,0.85vw,1rem);">VS</span>
                <div class="map-info-item" style="font-size:clamp(0.7rem,0.85vw,1rem);color:var(--text-muted);">
                    <span class="label" style="color:var(--t-orange);font-weight:600;">Team B</span>
                    <input type="text" id="t-team-name-input" class="next-input" placeholder="Team B" value="NAVI" data-display="t-team-name-display" style="font-size:inherit;min-width:100px;" />
                    <span id="t-team-name-display" class="next-display hidden" style="color:var(--t-orange);"></span>
                </div>
            </div>

            <!-- Match History -->
            <div class="history-section">
                <div class="history-title">═══ Match History ═══</div>
                <table class="map-table">
                    <thead>
                        <tr>
                            <th style="width:2.5em;">#</th>
                            <th>Map</th>
                            <th id="header-team-a" style="width:3em;color:var(--ct-blue);">Team A</th>
                            <th id="header-team-b" style="width:3em;color:var(--t-orange);">Team B</th>
                            <th style="width:4em;">Winner</th>
                            <th style="width:6em;">Status</th>
                            <th style="width:3em;">Just<br/>Ended</th>
                        </tr>
                    </thead>
                    <tbody id="map-tbody">
                        <!-- 5 map rows generated by JS -->
                    </tbody>
                </table>
            </div>

            <!-- Next Map -->
            <div class="next-section">
                <div class="next-item">
                    <span class="label">Next Map</span>
                    <input type="text" id="next-map-input" class="next-input" placeholder="Map name" value="Nuke" data-display="next-map-display" />
                    <span id="next-map-display" class="next-display hidden"></span>
                </div>
                <div class="next-item">
                    <span style="color:var(--text-muted)">·</span>
                </div>
                <div class="next-item">
                    <span class="label">Starts at</span>
                    <input type="time" id="next-time-input" class="time-input" value="21:30" data-display="next-time-display" style="min-width:50px;" />
                    <span id="next-time-display" class="next-display hidden"></span>
                </div>

                <!-- Auto Countdown -->
                <div class="timer-section">
                    <span class="timer-label">Countdown</span>
                    <div id="countdown-display" class="countdown-display">--:--</div>
                </div>
            </div>

            <!-- Confirm -->
            <button id="confirm-btn" class="confirm-btn">✦ CONFIRM</button>

        </div>
    </div>

    <script>
        (function() {
            'use strict';

            /* ---- Map Data ---- */
            const MAP_COUNT = 5;
            const defaultMaps = [
                { name: 'Inferno',    ctScore: '13', tScore: '8',  finished: true  },
                { name: 'Mirage',     ctScore: '11', tScore: '13', finished: false },
                { name: 'Anubis',     ctScore: '13', tScore: '10', finished: false },
                { name: '',           ctScore: '',   tScore: '',   finished: false },
                { name: '',           ctScore: '',   tScore: '',   finished: false },
            ];

            const tbody = document.getElementById('map-tbody');

            function buildMapRows() {
                let html = '';
                for (let i = 0; i < MAP_COUNT; i++) {
                    const d = defaultMaps[i];
                    const num = i + 1;
                    html += `
                        <tr class="map-row" data-index="${i}">
                            <td><span class="map-number">${num}</span></td>
                            <td>
                                <input type="text" id="map-name-${i}" class="map-input" placeholder="Map name" value="${d.name}" data-display="map-name-d-${i}" />
                                <span id="map-name-d-${i}" class="map-name-text hidden"></span>
                            </td>
                            <td>
                                <input type="number" id="map-ct-${i}" class="score-input ct" min="0" max="30" value="${d.ctScore}" data-display="map-ct-d-${i}" />
                                <span id="map-ct-d-${i}" class="score-text ct hidden"></span>
                            </td>
                            <td>
                                <input type="number" id="map-t-${i}" class="score-input t" min="0" max="30" value="${d.tScore}" data-display="map-t-d-${i}" />
                                <span id="map-t-d-${i}" class="score-text t hidden"></span>
                            </td>
                            <td>
                                <span id="map-winner-d-${i}" class="winner-badge hidden" style="display:none;"></span>
                            </td>
                            <td>
                                <span id="map-status-d-${i}" class="status-badge hidden" style="display:none;"></span>
                            </td>
                            <td style="text-align:center;">
                                <input type="radio" name="finished-map" value="${i}" id="finished-${i}" class="finished-radio" ${d.finished ? 'checked' : ''} />
                                <label for="finished-${i}" class="radio-label" id="finished-label-${i}">END</label>
                            </td>
                        </tr>
                    `;
                }
                tbody.innerHTML = html;
            }
            buildMapRows();

            /* ---- Refs ---- */
            const confirmBtn = document.getElementById('confirm-btn');

            /* ---- Helper: Sync team names to headers & series labels ---- */
            function syncTeamNames() {
                const teamA = document.getElementById('ct-team-name-input').value || 'Team A';
                const teamB = document.getElementById('t-team-name-input').value || 'Team B';
                document.getElementById('header-team-a').textContent = teamA;
                document.getElementById('header-team-b').textContent = teamB;
                document.getElementById('series-ct-label').textContent = teamA;
                document.getElementById('series-t-label').textContent = teamB;
            }

            /* ---- Helper: Update top result from finished map ---- */
            function updateTopResult() {
                const teamA = document.getElementById('ct-team-name-input').value || 'Team A';
                const teamB = document.getElementById('t-team-name-input').value || 'Team B';

                let finishedIdx = -1;
                for (let i = 0; i < MAP_COUNT; i++) {
                    const radio = document.getElementById('finished-' + i);
                    if (radio && radio.checked) { finishedIdx = i; break; }
                }
                if (finishedIdx === -1) { finishedIdx = 0; }

                const ctScore = document.getElementById('map-ct-' + finishedIdx).value || '0';
                const tScore  = document.getElementById('map-t-' + finishedIdx).value || '0';

                document.getElementById('top-ct-name').textContent = teamA;
                document.getElementById('top-t-name').textContent  = teamB;
                document.getElementById('top-ct-score').textContent = ctScore;
                document.getElementById('top-t-score').textContent  = tScore;

                const ctNum = parseInt(ctScore, 10) || 0;
                const tNum  = parseInt(tScore, 10) || 0;
                let winner = '';
                if (ctNum > tNum) winner = teamA;
                else if (tNum > ctNum) winner = teamB;
                else winner = '—';
                document.getElementById('top-winner').textContent = '✓ WINNER: ' + winner;
            }

            // Live-update team names, top result, series score
            document.addEventListener('input', function(e) {
                const id = e.target.id;
                if (id === 'ct-team-name-input' || id === 't-team-name-input') {
                    syncTeamNames();
                    updateTopResult();
                }
                if (e.target.closest('#map-tbody')) {
                    updateTopResult();
                    updateSeriesScore();
                }
            });
            document.addEventListener('change', function(e) {
                if (e.target.classList.contains('finished-radio')) {
                    updateTopResult();
                }
            });

            /* ---- Helper: Update series score ---- */
            function updateSeriesScore() {
                const teamA = document.getElementById('ct-team-name-input').value || 'Team A';
                const teamB = document.getElementById('t-team-name-input').value || 'Team B';
                let ctWins = 0, tWins = 0;
                for (let i = 0; i < MAP_COUNT; i++) {
                    const ct = parseInt(document.getElementById('map-ct-' + i).value, 10) || 0;
                    const t  = parseInt(document.getElementById('map-t-' + i).value, 10) || 0;
                    const name = document.getElementById('map-name-' + i).value.trim();
                    if (!name) continue;
                    if (ct > t) ctWins++;
                    else if (t > ct) tWins++;
                }
                document.getElementById('series-ct-score').textContent = ctWins;
                document.getElementById('series-t-score').textContent = tWins;
                // Also update labels (in case called separately)
                document.getElementById('series-ct-label').textContent = teamA;
                document.getElementById('series-t-label').textContent = teamB;
            }
            document.addEventListener('input', function(e) {
                if (e.target.closest('#map-tbody')) {
                    updateSeriesScore();
                }
            });

            // Initial update
            syncTeamNames();
            updateTopResult();
            updateSeriesScore();

            /* ---- Auto Countdown (time difference) ---- */
            const startTimeInput = document.getElementById('next-time-input');
            const countdownDisp  = document.getElementById('countdown-display');
            let autoTimerInterval = null;

            function formatCountdown(ms) {
                const totalSec = Math.floor(ms / 1000);
                if (totalSec <= 0) return '00:00';
                const hrs = Math.floor(totalSec / 3600);
                const mins = Math.floor((totalSec % 3600) / 60);
                const secs = totalSec % 60;
                if (hrs > 0) {
                    return String(hrs).padStart(2, '0') + ':' + String(mins).padStart(2, '0') + ':' + String(secs).padStart(2, '0');
                }
                return String(mins).padStart(2, '0') + ':' + String(secs).padStart(2, '0');
            }

            function updateAutoCountdown() {
                const timeStr = startTimeInput.value;
                if (!timeStr) {
                    countdownDisp.textContent = '--:--';
                    countdownDisp.className = 'countdown-display';
                    return;
                }

                const now = new Date();
                const [h, m] = timeStr.split(':').map(Number);
                const target = new Date(now);
                target.setHours(h, m, 0, 0);

                let diffMs = target - now;

                if (diffMs <= 0) {
                    // Start time has passed
                    if (Math.abs(diffMs) <= 2 * 3600 * 1000) {
                        // Passed within 2h → just finished, show 00:00
                        countdownDisp.textContent = '00:00';
                        countdownDisp.className = 'countdown-display zero';
                        return;
                    }
                    // Passed more than 2h ago → go to next day
                    target.setDate(target.getDate() + 1);
                    diffMs = target - now;
                }

                // Show countdown to the next occurrence
                countdownDisp.textContent = formatCountdown(diffMs);
                countdownDisp.className = 'countdown-display';
            }

            autoTimerInterval = setInterval(updateAutoCountdown, 1000);
            updateAutoCountdown();
            startTimeInput.addEventListener('change', updateAutoCountdown);
            startTimeInput.addEventListener('input', updateAutoCountdown);

            /* ---- Confirm Logic ---- */
            const confirmAll = function() {
                // Process standard data-display fields (includes next-time-input)
                const inputs = document.querySelectorAll('[data-display]');
                inputs.forEach(function(input) {
                    const displayId = input.getAttribute('data-display');
                    const display = document.getElementById(displayId);
                    if (!display) return;
                    display.textContent = input.value || input.placeholder || '—';
                    input.classList.add('hidden');
                    display.classList.remove('hidden');
                    display.classList.add('fade-in');
                });

                // Process map rows: show score displays, winner, status
                for (let i = 0; i < MAP_COUNT; i++) {
                    const nameInput = document.getElementById('map-name-' + i);
                    const ctInput  = document.getElementById('map-ct-' + i);
                    const tInput   = document.getElementById('map-t-' + i);
                    const nameDisp = document.getElementById('map-name-d-' + i);
                    const ctDisp   = document.getElementById('map-ct-d-' + i);
                    const tDisp    = document.getElementById('map-t-d-' + i);
                    const winnerDisp = document.getElementById('map-winner-d-' + i);
                    const statusDisp = document.getElementById('map-status-d-' + i);

                    // Check if this row has data
                    const nameVal = nameInput.value.trim();
                    if (!nameVal) {
                        // Hide the entire row if no map name
                        const row = nameInput.closest('tr');
                        if (row) row.classList.add('hidden');
                        continue;
                    }

                    // Copy name, scores
                    nameDisp.textContent = nameVal;
                    nameInput.classList.add('hidden');
                    nameDisp.classList.remove('hidden');

                    const ctVal = ctInput.value || '0';
                    const tVal  = tInput.value || '0';
                    ctDisp.textContent = ctVal;
                    tDisp.textContent  = tVal;
                    ctInput.classList.add('hidden');
                    tInput.classList.add('hidden');
                    ctDisp.classList.remove('hidden');
                    tDisp.classList.remove('hidden');

                    const ctNum = parseInt(ctVal, 10) || 0;
                    const tNum  = parseInt(tVal, 10) || 0;

                    // Winner badge — show team name
                    const teamA = document.getElementById('ct-team-name-input').value || 'Team A';
                    const teamB = document.getElementById('t-team-name-input').value || 'Team B';
                    let winnerLabel = '';
                    let winnerClass = '';
                    if (ctNum > tNum) { winnerLabel = teamA; winnerClass = 'ct'; }
                    else if (tNum > ctNum) { winnerLabel = teamB; winnerClass = 't'; }
                    else { winnerLabel = '—'; winnerClass = ''; }

                    if (winnerLabel && winnerClass) {
                        winnerDisp.textContent = winnerLabel;
                        winnerDisp.className = 'winner-badge ' + winnerClass;
                        winnerDisp.style.display = '';
                    } else {
                        winnerDisp.textContent = '—';
                        winnerDisp.className = 'winner-badge';
                        winnerDisp.style.display = '';
                    }

                    // Status badge
                    const radio = document.getElementById('finished-' + i);
                    if (radio && radio.checked) {
                        statusDisp.innerHTML = '<span class="arrow">◀</span> JUST ENDED';
                        statusDisp.style.display = '';
                        // Highlight row
                        const row = nameInput.closest('tr');
                        if (row) row.classList.add('finished');
                    } else {
                        statusDisp.textContent = '';
                        statusDisp.style.display = 'none';
                    }
                }

                // Hide radio labels and columns
                document.querySelectorAll('.finished-radio').forEach(function(r) { r.classList.add('hidden'); });
                document.querySelectorAll('.radio-label').forEach(function(l) { l.classList.add('hidden'); });
                // Hide the "Just Ended" header
                const ths = document.querySelectorAll('.map-table th');
                if (ths.length >= 7) ths[6].classList.add('hidden');

                // Hide team name inputs row (the parent flex container)
                const teamRow = document.getElementById('ct-team-name-input').closest('div[style*="flex"]');
                if (teamRow) teamRow.classList.add('hidden');

                // Hide confirm button
                confirmBtn.classList.add('hidden');

                // Final refresh
                updateTopResult();
                updateSeriesScore();
            };

            confirmBtn.addEventListener('click', confirmAll);

            document.addEventListener('keydown', function(e) {
                if (e.key === 'Enter' && e.target.tagName === 'INPUT') {
                    e.preventDefault();
                }
            });

        })();
    </script>
</body>
</html>
