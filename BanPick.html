<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ban & Pick — CS2 HUD</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Rajdhani:wght@500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="css/BanPick.css">
</head>
<body>
    <div class="screen">
        <div class="content">

            <!-- Title -->
            <div class="bp-title">
                BAN & <span class="highlight">PICK</span>
            </div>

            <!-- Teams — just team identity colors -->
            <div class="team-row">
                <div class="team-box team1">
                    <input type="text" id="team1-input" class="team-name-input" placeholder="Team 1" value="Team Liquid" />
                </div>
                <div class="vs-text">VS</div>
                <div class="team-box team2">
                    <input type="text" id="team2-input" class="team-name-input" placeholder="Team 2" value="NAVI" />
                </div>
            </div>

            <!-- Maps Container -->
            <div class="maps-container" id="mapsContainer"></div>

            <!-- Bottom Bar -->
            <div class="bottom-bar">
                <div class="bp-stats">
                    <span>Bans: <span class="num" id="banCount">0</span></span>
                    <span>Picks: <span class="num" id="pickCount">0</span></span>
                    <span style="color:var(--text-muted)">·</span>
                    <span><span class="num t1-color" id="t1PickCount">0</span> picked</span>
                    <span><span class="num t2-color" id="t2PickCount">0</span> picked</span>
                </div>
                <button class="play-btn" id="playBtn" disabled><i class="fa-solid fa-play"></i> PLAY SEQUENCE</button>
            </div>

        </div>
    </div>

    <!-- Dialog Overlay -->
    <div class="dialog-overlay" id="dialogOverlay">
        <div class="dialog-box">
            <div class="dialog-title" id="dialogTitle">Select</div>
            <div class="dialog-sub" id="dialogSub">Choose an option</div>
            <div class="dialog-options" id="dialogOptions">
                <button class="dialog-opt-btn t1-clr" data-result='{"team":1}'>Team 1</button>
                <button class="dialog-opt-btn t2-clr" data-result='{"team":2}'>Team 2</button>
            </div>
            <button class="dialog-cancel-btn" id="dialogCancel">Cancel</button>
        </div>
    </div>

    <script src="js/BanPick.js"></script>
</body>
</html>
